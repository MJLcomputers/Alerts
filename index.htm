<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MJL Alarm Manager</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 550px; margin: 30px auto; background: #f0f2f5; color: #1c1e21; padding: 0 15px; }
        .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* Digital Clock Styles */
        .clock-container { text-align: center; background: #1c1e21; color: #00ff41; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-family: 'Courier New', monospace; box-shadow: inset 0 0 10px #000; }
        .clock-time { font-size: 3.0em; font-weight: bold; color: #0000ff; }
        .clock-date { font-size: 1.5em; font-weight: bold; color: #0000ff; }

        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 0.85em; color: #606770; margin-bottom: 4px; }
        input[type="text"], input[type="datetime-local"], .vol-slider { width: 95%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 1em; }
        
        /* Modal Window */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(3px); }
        .modal-content { background: #fff; margin: 5% auto; padding: 20px; width: 90%; max-width: 500px; border-radius: 15px; max-height: 80vh; overflow-y: auto; position: relative; }
        
        .alarm-item { border-left: 6px solid #4267b2; padding: 15px; margin: 12px 0; background: #f9f9f9; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; }
        .alarm-item.ringing { background: #fff0f0; border-left-color: #ff4d4d; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.4); } 70% { box-shadow: 0 0 0 12px rgba(255, 77, 77, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0); } }
        
        .countdown { font-weight: bold; color: #e41e3f; font-family: monospace; font-size: 1.1em; }
        .btn-main { background: #4267b2; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1em; }
        .btn-view { background: #67c23a; }
        .btn-danger { background: #ff4d4d; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; }
        .btn-snooze { background: #f0ad4e; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; margin-right: 5px;}
        .close-btn { position: absolute; right: 20px; top: 15px; cursor: pointer; font-size: 1.5em; }
    </style>
</head>
<body>

    <div class="card">
        <!-- Live Digital Clock -->
        <div class="clock-container">
            <div id="liveClock" class="clock-time">00:00:00</div>
            <div id="liveDate" class="clock-date">Loading...</div>
        </div>

        <h3 style="margin-top:0">⏰ Mike's Custom Alarms (<span id="totalCount">0</span>/7)</h3>
        
        <div class="input-group">
            <label>Master Volume: <span id="volLabel">100%</span></label>
            <input type="range" id="volSlider" class="vol-slider" min="0" max="1" step="0.01" value="1" oninput="updateVolume(this.value)">
        </div>

        <div class="input-group">
            <label>Alarm Name</label>
            <input type="text" id="nameInput" placeholder="e.g., Mike's New Custom Alarm">
        </div>

        <div class="input-group">
            <label>Date & Time</label>
            <input type="datetime-local" id="timeInput">
        </div>
        
        <div class="input-group">
            <label>Sound File</label>
            <input type="file" id="audioInput" accept="audio/*">
            <button class="btn-main" style="background:#888; font-size: 0.85em; padding: 6px;" onclick="togglePreview()" id="testBtn">Test Sound</button>
        </div>

        <button class="btn-main" onclick="addAlarm()">Set Alarm</button>
        <button class="btn-main btn-view" onclick="toggleModal(true)">View All Alarms</button>
    </div>

    <!-- Modal List Window -->
    <div id="alarmModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="toggleModal(false)">&times;</span>
            <h3 style="margin-top:0">Alarm Status List</h3>
            <div id="modalList"></div>
            <button class="btn-main" style="background:#ff4d4d; margin-top:20px;" onclick="clearAll()">Clear All Alarms</button>
        </div>
    </div>

    <audio id="player" loop></audio>

    <script>
        const MAX = 7;
        const SNOOZE_MS = 5 * 60 * 1000;
        let alarms = [];
        const player = document.getElementById('player');
        let isPreviewing = false;

        window.onload = () => {
            const savedAlarms = localStorage.getItem('myAlarms');
            const savedVol = localStorage.getItem('alarmVol');

            if (savedAlarms) {
                alarms = JSON.parse(savedAlarms).map(a => ({ ...a, time: new Date(a.time) }));
                alarms.forEach(a => scheduleTimeout(a));
            }
            if (savedVol) {
                updateVolume(savedVol);
                document.getElementById('volSlider').value = savedVol;
            }
            updateCounts();
            
            // Start Clock and UI updates
            setInterval(updateGlobalClock, 1000);
            setInterval(refreshUI, 1000);
        };

        function updateGlobalClock() {
            const now = new Date();
            document.getElementById('liveClock').innerText = now.toLocaleTimeString();
            document.getElementById('liveDate').innerText = now.toDateString();
        }

        function updateVolume(val) {
            player.volume = val;
            document.getElementById('volLabel').innerText = Math.round(val * 100) + "%";
            localStorage.setItem('alarmVol', val);
        }

        async function togglePreview() {
            const file = document.getElementById('audioInput').files[0];
            if (!file) return alert("Select a file first!");
            if (isPreviewing) {
                player.pause(); player.src = "";
                document.getElementById('testBtn').innerText = "Test Sound";
                isPreviewing = false;
            } else {
                player.src = await toBase64(file);
                player.play();
                document.getElementById('testBtn').innerText = "⏹ Stop Preview";
                isPreviewing = true;
            }
        }

        async function addAlarm() {
            const name = document.getElementById('nameInput').value || "Alarm";
            const timeVal = document.getElementById('timeInput').value;
            const file = document.getElementById('audioInput').files[0];

            if (alarms.length >= MAX) return alert("Limit reached!");
            if (!timeVal || !file) return alert("Time and sound required.");

            const alarm = {
                id: Date.now(),
                name: name,
                time: new Date(timeVal),
                audioData: await toBase64(file),
                status: 'active'
            };

            if (alarm.time <= new Date()) return alert("Damn it, Jim! I'm a clock, not a time machine... Pick a time in the future.");

            alarms.push(alarm);
            saveData();
            scheduleTimeout(alarm);
            updateCounts();
            document.getElementById('nameInput').value = "";
        }

        function scheduleTimeout(a) {
            const diff = a.time - new Date();
            if (diff > 0) a.timeoutId = setTimeout(() => trigger(a.id), diff);
        }

        function trigger(id) {
            const a = alarms.find(x => x.id === id);
            if (a) {
                a.status = 'ringing';
                player.src = a.audioData;
                player.play().catch(() => alert("RINGING: " + a.name));
                toggleModal(true);
            }
        }

        function stopAlarm(id) {
            player.pause();
            alarms = alarms.filter(a => a.id !== id);
            saveData();
            updateCounts();
        }

        function snoozeAlarm(id) {
            player.pause();
            const a = alarms.find(x => x.id === id);
            if (a) {
                a.time = new Date(Date.now() + SNOOZE_MS);
                a.status = 'active';
                scheduleTimeout(a);
                saveData();
            }
        }

        function clearAll() {
            alarms.forEach(a => clearTimeout(a.timeoutId));
            alarms = [];
            player.pause();
            saveData();
            updateCounts();
            toggleModal(false);
        }

        function toggleModal(show) {
            document.getElementById('alarmModal').style.display = show ? 'block' : 'none';
        }

        function saveData() {
            localStorage.setItem('myAlarms', JSON.stringify(alarms.map(({timeoutId, ...rest}) => rest)));
        }

        function updateCounts() {
            document.getElementById('totalCount').innerText = alarms.length;
        }

        function refreshUI() {
            const container = document.getElementById('modalList');
            if (alarms.length === 0) {
                container.innerHTML = "<p>No alarms currently set.</p>";
                return;
            }
            container.innerHTML = alarms.map(a => `
                <div class="alarm-item ${a.status === 'ringing' ? 'ringing' : ''}">
                    <div style="max-width: 60%">
                        <strong>${a.name}</strong><br>
                        <small style="color:#666">${a.time.toLocaleString()}</small><br>
                        <span class="countdown">${a.status === 'ringing' ? '🔔 RINGING!' : formatTime(a.time)}</span>
                    </div>
                    <div>
                        ${a.status === 'ringing' ? 
                            `<button class="btn-snooze" onclick="snoozeAlarm(${a.id})">Snooze</button>
                             <button class="btn-danger" onclick="stopAlarm(${a.id})">Stop</button>` : 
                            `<button class="btn-danger" onclick="stopAlarm(${a.id})">Delete</button>`
                        }
                    </div>
                </div>
            `).join('');
        }

        function formatTime(target) {
            const diff = target - new Date();
            if (diff <= 0) return "00:00:00";
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            return `${h}h ${m}m ${s}s`.replace(/\b(\d)\b/g, '0$1');
        }

        const toBase64 = f => new Promise((res, rej) => {
            const r = new FileReader(); r.readAsDataURL(f);
            r.onload = () => res(r.result); r.onerror = rej;
        });
    </script>
</body>
</html>
